apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudbanking-backend-ingress
  namespace: cloudbanking
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-central-1:777208093235:certificate/ba28e521-91ee-4537-b114-51db8eebab83
    alb.ingress.kubernetes.io/ssl-redirect: "443"
spec:
  ingressClassName: alb
  rules:
    - host: api.cloudbanking.ameeradel.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudbanking-backend-service
                port:
                  number: 3000